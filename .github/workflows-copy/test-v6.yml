# 1. 触发条件
# 推送事件：当代码推送到next分支时触发。
# 拉取请求事件：当针对next分支创建或更新拉取请求时触发。
# 2. 并发控制
# 使用concurrency配置确保同一工作流（相同工作流名称和相同PR或分支）同时只有一个运行实例。当有新的提交时，会取消正在进行的运行。
# 3. 权限设置
# 只读权限：contents: read，即工作流只能读取仓库内容。
# 4. 作业（Jobs）详解
# 4.1. lint作业
# 目的：运行代码规范检查。
# 步骤：
# 检出代码。
# 设置Bun环境。
# 安装依赖（bun install）。
# 运行lint（bun run lint）。
# 4.2. test-react-legacy作业
# 目的：针对旧版React（这里特指React 18）运行测试。
# 策略：矩阵策略，包括两个分片（shard: 1/2, 2/2）。
# 步骤：
# 设置环境。
# 安装依赖。
# 根据矩阵中的React版本安装对应React（这里只有18）。
# 运行DOM测试（分片执行）。
# 4.3. test-node作业
# 目的：运行Node环境下的测试（非浏览器环境）。
# 步骤：
# 设置环境。
# 安装依赖。
# 运行测试（bun run test:node）。
# 4.4. test-react-latest作业
# 目的：针对最新版React运行测试（目前配置中模块为dom，分片执行）。
# 策略：矩阵策略，包括两个分片（shard: 1/2, 2/2）。
# 步骤：
# 设置环境。
# 安装依赖。
# 运行DOM测试（分片执行，并收集覆盖率）。
# 保存覆盖率文件。
# 上传覆盖率文件作为工件（供后续合并使用）。
# 4.5. test-react-latest-dist作业
# 目的：测试构建后的dist和dist-min包。
# 依赖：需要先完成build作业。
# 策略：矩阵策略，测试dist和dist-min两个模块，每个模块分两个分片。
# 步骤：
# 设置环境。
# 安装依赖。
# 从缓存恢复dist目录（由build作业生成）。
# 根据矩阵中的模块（dist或dist-min）运行测试（设置环境变量LIB_DIR）。
# 4.6. upload-test-coverage作业
# 目的：合并覆盖率报告并上传到Codecov。
# 依赖：需要test-react-latest作业完成。
# 步骤：
# 设置环境。
# 安装依赖。
# 下载之前保存的覆盖率工件（多个文件）。
# 合并覆盖率报告（使用nyc）。
# 上传合并后的覆盖率到Codecov（需要提供secrets.CODECOV_TOKEN）。
# 4.7. build作业
# 目的：构建项目（包括编译、打包等）。
# 步骤：
# 设置环境。
# 安装依赖。
# 尝试恢复lib、es目录的缓存（如果存在）。
# 运行编译（bun run compile）。
# 尝试恢复dist目录缓存（如果存在）。
# 运行打包（bun run dist，设置大内存和CI环境变量）。
# 检查构建文件（bun run test:dekko，验证文件结构）。
# 如果是推送到master分支，则上传构建产物（dist, locale, es, lib）作为工件。
# 如果是ant-design/ant-design仓库的master分支推送，则压缩构建产物并上传到阿里云OSS（使用脚本）。
# 4.8. test-lib-es作业
# 目的：测试lib和es模块。
# 策略：矩阵策略，测试lib和es两个模块，每个模块分两个分片。
# 步骤：
# 设置环境。
# 安装依赖。
# 尝试恢复对应模块（lib或es）的缓存（如果是PR且模块为lib，则跳过缓存恢复和后续步骤，因为lib只在非PR时构建）。
# 运行编译（bun run compile，同样非PR或非lib模块）。
# 运行测试（分片执行，设置环境变量LIB_DIR为当前模块）。
# 5. 关键特点
# 并行测试：通过矩阵分片（shard）将测试任务拆分，并行执行以加速测试过程。
# 缓存利用：多处使用actions/cache来缓存构建产物（lib, es, dist），避免重复构建，加快执行速度。
# 资源控制：在构建步骤（dist）中分配大内存（4GB）避免OOM。
# 覆盖率收集与合并：收集多个测试任务的覆盖率，合并后上传至Codecov。
# 构建产物处理：在master分支推送时，上传构建产物并存储到阿里云OSS。
# 6. 安全与凭证
# 凭证：使用secrets存储Codecov的令牌（CODECOV_TOKEN）和阿里云OSS的访问密钥（ALI_OSS_AK_ID和ALI_OSS_AK_SECRET）。
# 7. 条件执行
# 多个作业步骤中使用了条件判断（if语句），例如：
# 只在非PR或非lib模块时执行某些步骤（避免在PR中构建lib，因为lib通常由主分支构建）。
# 只在推送到master分支时上传构建产物。
# 总结
# 这个工作流为Ant Design项目提供了全面的测试和构建保障，包括代码规范检查、多环境测试（React不同版本、Node环境、构建后产物）、覆盖率收集和构建产物处理。通过并发控制、矩阵分片和缓存机制，优化了执行效率。同时，通过条件执行和凭证管理，确保了安全性和资源合理利用。
# Origin Source
# https://github.com/ant-design/ant-design/blob/79f566b7f8abb1012ef55b0d2793bfdf5595b85d/.github/workflows/test.yml
name: ✅ test v6

on:
  push:
    branches: [next]
  pull_request:
    branches: [next]

# Cancel prev CI if new commit come
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint

  ################################ Test ################################
  test-react-legacy:
    name: test-react-legacy
    strategy:
      matrix:
        react: ['18']
        shard: [1/2, 2/2]
    env:
      REACT: ${{ matrix.react }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: install react 18
        if: ${{ matrix.react == '18' }}
        run: bun run bun-install-react-18
      # dom test
      - name: dom test
        run: bun run test -- --maxWorkers=2 --shard=${{matrix.shard}}

  test-node:
    name: test-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run test:node

  test-react-latest:
    name: test-react-latest
    strategy:
      matrix:
        module: [dom]
        shard: [1/2, 2/2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      # dom test
      - name: dom test
        run: bun run test -- --maxWorkers=2 --shard=${{matrix.shard}} --coverage

      - name: persist coverages
        run: |
          mkdir persist-coverage
          mv coverage/coverage-final.json persist-coverage/react-test-${{matrix.module}}-${{strategy.job-index}}.json

      - uses: actions/upload-artifact@v4
        name: upload coverages
        with:
          name: coverage-artifacts-${{ matrix.module }}-${{ strategy.job-index }}
          path: persist-coverage/

  test-react-latest-dist:
    name: test-react-latest-dist
    strategy:
      matrix:
        module: [dist, dist-min]
        shard: [1/2, 2/2]
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: restore cache from dist
        uses: actions/cache@v4
        with:
          path: dist
          key: dist-${{ github.sha }}

      - name: dist-min test
        if: ${{ matrix.module == 'dist-min' }}
        run: bun run test
        env:
          LIB_DIR: dist-min

      - name: dist test
        if: ${{ matrix.module == 'dist' }}
        run: bun run test
        env:
          LIB_DIR: dist

  ############################ Test Coverage ###########################
  upload-test-coverage:
    name: test-coverage
    runs-on: ubuntu-latest
    needs: test-react-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - uses: actions/download-artifact@v5
        with:
          pattern: coverage-artifacts-*
          merge-multiple: true
          path: persist-coverage
      - name: Merge Code Coverage
        run: |
          bunx nyc merge persist-coverage/ coverage/coverage-final.json
          bunx nyc report --reporter text -t coverage --report-dir coverage
          rm -rf persist-coverage
      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v5
        with:
          # use own token to upload coverage reports
          token: ${{ secrets.CODECOV_TOKEN }}

  ########################### Compile & Test ###########################
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: cache lib
        uses: actions/cache@v4
        with:
          path: lib
          key: lib-${{ github.sha }}

      - name: cache es
        uses: actions/cache@v4
        with:
          path: es
          key: es-${{ github.sha }}

      - name: compile
        run: bun run compile

      - name: cache dist
        uses: actions/cache@v4
        with:
          path: dist
          key: dist-${{ github.sha }}

      - name: dist
        run: bun run dist
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CI: 1

      - name: check build files
        run: bun run test:dekko

      # Artifact build files
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: build artifacts
          path: |
            dist
            locale
            es
            lib

      - name: zip builds
        if: github.repository == 'ant-design/ant-design' && github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          ALI_OSS_AK_ID: ${{ secrets.ALI_OSS_AK_ID }}
          ALI_OSS_AK_SECRET: ${{ secrets.ALI_OSS_AK_SECRET }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          zip -r oss-artifacts.zip dist locale es lib
          echo "🤖 Uploading"
          node scripts/visual-regression/upload.js ./oss-artifacts.zip --ref=$HEAD_SHA

  test-lib-es:
    name: test lib/es module
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [lib, es]
        shard: [1/2, 2/2]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: restore cache from ${{ matrix.module }}
        # lib only run in master branch not in pull request
        if: ${{ github.event_name != 'pull_request' || matrix.module != 'lib' }}
        uses: actions/cache@v4
        with:
          path: ${{ matrix.module }}
          key: ${{ matrix.module }}-${{ github.sha }}

      - name: compile
        # lib only run in master branch not in pull request
        if: ${{ github.event_name != 'pull_request' || matrix.module != 'lib' }}
        run: bun run compile

      - name: test
        # lib only run in master branch not in pull request
        if: ${{ github.event_name != 'pull_request' || matrix.module != 'lib' }}
        run: bun run test -- --maxWorkers=2 --shard=${{matrix.shard}}
        env:
          LIB_DIR: ${{ matrix.module }}
