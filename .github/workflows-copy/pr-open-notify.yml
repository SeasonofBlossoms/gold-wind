# 这个 GitHub Actions 脚本内容主要是关于自动化处理和管理拉取请求（PR）。它包含了三个不同的工作流程（jobs）：

# PullRequest Contributor Welcome

# 触发条件：当 PR 被合并时，特别是涉及 components/** 路径下的文件。
# 功能：如果 PR 作者的提交次数少于 3 次，自动在 PR 中留言，欢迎贡献者加入钉钉社区群并提供二维码，促进社区互动。
# PR Open Check

# 触发条件：当 PR 被打开、编辑、重新打开或同步时触发。
# 功能：
# 如果 PR 提及的 issue 需要设计师或核心团队确认，拒绝合并，并提醒 PR 创建者进行进一步确认。
# 检查 PR 是否已填写 changelog，如果未填写，自动评论提醒创建者补充 changelog 信息，确保 PR 描述符合规范。
# 为 PR 添加标签和审阅者，提升协作效率。
# PR Open Notify

# 触发条件：当 PR 被打开时触发。
# 功能：将新开 PR 的相关信息通知到钉钉群组，提醒团队成员进行代码审查。
name: PR Open Notify

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read

jobs:
  send-to-dingtalk:
    runs-on: ubuntu-latest
    steps:
      - name: send to dingtalk
        uses: visiky/dingtalk-release-notify@main
        with:
          DING_TALK_TOKEN: |
            ${{ secrets.DINGDING_BOT_TOKEN }}
            ${{ secrets.DINGDING_BOT_COLLABORATOR_TOKEN }}
          notify_title: '🔥 @${{ github.event.pull_request.user.login }} 创建了 PR：${{ github.event.pull_request.title }} ${{ github.event.pull_request.html_url }}'
          notify_body: |
            ### 🔥 [@${{ github.event.pull_request.user.login }}](https://github.com/${{ github.event.pull_request.user.login }}) 创建了 PR：
            [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})
            <hr />
          notify_footer: '> 🫵🏻 快去 Review 吧，社区需要你的帮助！'
          at_all: false # whether to ding everybody
