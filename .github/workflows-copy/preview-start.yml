# 这段代码是用于 GitHub Actions 的配置文件，具体来说，它是用于在 GitHub 上的 Pull Request 操作时生成预览链接。具体步骤包括：

# 触发条件：当 Pull Request 被打开、同步或重新打开时，触发这个工作流。
# 权限设置：该工作流需要一些权限来修改与 Pull Request 和 Issues 相关的评论内容。
# 工作步骤：
# 使用 actions-cool/maintain-one-comment@v3 插件更新或创建一个评论。
# 该评论包含一个 GIF 图像，表示准备预览，并提供一个链接到该预览页面。
# 预览页面的 URL 被动态生成，通常用于展示 Pull Request 的实际效果。
# When `preview-build` start. Leave a message on the PR
#
# 🚨🚨🚨 Important 🚨🚨🚨
# Never do any `checkout` or `npm install` action!
# `pull_request_target` will enable PR to access the secrets!

name: Preview Start

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  preview-start:
    permissions:
      issues: write # for actions-cool/maintain-one-comment to modify or create issue comments
      pull-requests: write # for actions-cool/maintain-one-comment to modify or create PR comments
    name: start preview info
    runs-on: ubuntu-latest
    steps:
      - name: update status comment
        uses: actions-cool/maintain-one-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            [<img width="500" alt="Prepare preview" src="https://user-images.githubusercontent.com/5378891/72351368-2c979e00-371b-11ea-9652-eb4e825d745e.gif">](https://preview-${{ github.event.number }}-ant-design.surge.sh)
            <!-- AUTO_PREVIEW_HOOK -->
          body-include: <!-- AUTO_PREVIEW_HOOK -->
