# 正在分析一个GitHub Actions工作流，该工作流用于处理视觉回归测试的差异批准。工作流在issue_comment事件（创建、编辑、删除评论）时触发，主要功能是检查PR中的评论，判断视觉差异是否通过或需要批准。

# 工作流的核心逻辑在“Statistic Visual Diff Approval”步骤中，使用actions/github-script执行JavaScript代码来统计评论并设置状态。

# 步骤分析：

# 首先，获取PR的头部SHA（用于后续设置状态）。

# 获取该PR的所有评论。

# 遍历评论，检查三种情况： a. 是否有评论包含'VISUAL_DIFF_SUCCESS'（表示视觉差异成功） b. 是否有评论包含'VISUAL_DIFF_FAILED'（表示视觉差异失败） c. 是否有核心成员批准（通过检查评论中是否包含特定勾选框标记）

# 根据检查结果计算状态：

# 如果有VISUAL_DIFF_SUCCESS，或者有VISUAL_DIFF_FAILED并且有成员批准，则视为通过（状态为success）。
# 如果有VISUAL_DIFF_FAILED但没有成员批准，则状态为failure。
# 其他情况为pending（等待中）。
# 获取当前提交的状态，如果状态没有变化，则不更新；否则，更新状态（在提交状态中设置一个名为'Visual Regression Diff Wait Approve'的状态）。

# 最后，输出结果（success/failed/waiting）到步骤的输出，供后续步骤使用。

# 注意：成员批准的条件是评论中同时包含： - 勾选了复选框：- [x] Visual diff is acceptable - 并且没有未勾选的重要标记（通过正则表达式/(?<=\>\s\[!IMPORTANT\].*?- \[ \])/s匹配，如果匹配到则说明有未勾选的重要项，则不算批准）

# 但是，根据代码中的逻辑，正则匹配是检查是否存在未勾选的[!IMPORTANT]项，如果匹配到（即不为null）则说明有未勾选的重要项，那么即使有上面的勾选也不视为批准。而代码中写的是comment.body.match(RE)  == null，也就是说，如果匹配不到未勾选的重要项（即没有未勾选的重要项），才视为批准。

# 然而，在代码中，我们只检查了评论中是否有- [x] Visual diff is acceptable，并且同时没有未勾选的重要项（即匹配不到未勾选的重要项），则视为成员批准。

# 最后，在控制台输出步骤的状态。

# 根据用户的问题：“Check the report passed or developer confirmed the diff”，这个工作流正是做这个事情的。

# 因此，我们可以将这个工作流的功能总结如下：

# 工作流名称：🤖 Visual Regression Diff Approval

# 触发事件：当PR的评论被创建、编辑或删除时。

# 工作流程：

# 当有评论时，检查评论内容：

# 如果评论包含'VISUAL_DIFF_SUCCESS'，则视觉回归测试通过。
# 如果评论包含'VISUAL_DIFF_FAILED'，则需要进一步检查是否有核心成员批准。
# 核心成员批准的条件：评论中包含一个被勾选的复选框“Visual diff is acceptable”，并且该评论中没有未勾选的重要标记（即[!IMPORTANT]标记的项都已被勾选）。
# 根据上述条件，设置一个名为“Visual Regression Diff Wait Approve”的提交状态，状态可以是success（通过）、failure（失败）或pending（等待中）。

# 最后，在控制台输出这个状态。

# 这个工作流实现了自动化检查视觉回归测试的差异报告是否通过，或者是否有开发者确认差异是允许的（即批准）。

# 注意：该工作流需要写PR和状态的权限，因为它会更新提交状态。
# Check the report passed or developer confirmed the diff

name: 🤖 Visual Regression Diff Approval

# on comment event
on:
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: read

jobs:
  approval:
    permissions:
      pull-requests: write
      statuses: write # Allow to modfiy commit status
    name: Check Virtual Regression Approval
    if: github.event.issue.pull_request != ''
    runs-on: ubuntu-latest
    steps:
      # Check all the comments if contains `VISUAL_DIFF_SUCCESS` or `VISUAL_DIFF_FAILED`
      # Check if member of repo comment `Pass Visual Diff`
      # Return type: `success` or `failed` or `waiting`
      - name: Statistic Visual Diff Approval
        id: check_approval
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.payload.issue.number;
            console.log('PR:', issue_number);

            const prResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue_number,
            });
            const prHeadSha = prResponse.data.head.sha;
            console.log('Head SHA:', prHeadSha);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number
            });

            console.log('Comments:', comments.length);

            let hasDiffSuccess = false;
            let hasDiffFailed = false;
            let hasMemberApprove = false;

            for (const comment of comments) {
              if (comment.body.includes('VISUAL_DIFF_SUCCESS')) {
                hasDiffSuccess = true;
              }
              if (comment.body.includes('VISUAL_DIFF_FAILED')) {
                hasDiffFailed = true;
              }

              // https://regex101.com/r/kLjudz/1
              const RE = /(?<=\>\s\[!IMPORTANT\].*?- \[ \])/s;
              if (
                comment.body.includes('- [x] Visual diff is acceptable') &&
                comment.body.match(RE) == null /** 检查 IMPORTANT 是否存在未勾选的 */
              ) {
                hasMemberApprove = true;
              }
            }

            console.log('hasDiffSuccess:', hasDiffSuccess);
            console.log('hasDiffFailed:', hasDiffFailed);
            console.log('hasMemberApprove:', hasMemberApprove);

            const diffPassed = hasDiffSuccess || (hasDiffFailed && hasMemberApprove);
            const mergedStatus = diffPassed ? 'success' : hasDiffFailed ? 'failure' : 'pending';
            console.log('Status:', mergedStatus);

            const { data: currentStatuses } = await github.rest.repos.listCommitStatusesForRef({
             owner: context.repo.owner,
             repo: context.repo.repo,
             ref: prHeadSha,
            });

            const currentStatus = currentStatuses.find(status => status.context === 'Visual Regression Diff Wait Approve');
            if (currentStatus && currentStatus.state === mergedStatus) {
              console.log('Status has not changed, no need to update:', currentStatus.state);
            } else {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: prHeadSha,
                state: mergedStatus,
                context: 'Visual Regression Diff Wait Approve',
                description: diffPassed ? 'Visual diff is acceptable' : 'Visual diff is not pass',
              });
            }

            if (hasDiffSuccess || (hasDiffFailed && hasMemberApprove)) {
              return 'success';
            } else if (hasDiffFailed) {
              return 'failed';
            } else {
              return 'waiting';
            }

      # Console check_approval status
      - name: Console Status
        run: echo "Result -> ${{ steps.check_approval.outputs.result }}"
