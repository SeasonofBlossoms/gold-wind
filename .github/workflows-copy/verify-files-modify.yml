# 我们正在分析一个GitHub Actions工作流，名为"Verify Files modify"，它会在pull request打开或同步时触发。 工作流有两个任务：verify和readme。

# 首先，注意触发条件：pull_request_target事件，类型为opened和synchronize（即当PR被创建或更新时）。 其次，整个工作流有两个job：verify和readme。

# 这两个job都有相同的条件：只有当PR的创建者不是'renovate[bot]'和'Copilot'时才会运行。这是为了避免自动化的bot触发的PR也运行这个工作流。

# 每个job都使用了一个名为actions-cool/verify-files-modify的action，并指定了具体的commit SHA，以确保使用的是固定版本。

# 下面分别解析两个job：

# verify任务（verify-version步骤）：

# 目的是验证PR中是否修改了禁止修改的文件或路径。
# 配置参数： forbid-paths: '.github/, scripts/' # 禁止修改这些路径下的文件 forbid-files: 'CHANGELOG.zh-CN.md, CHANGELOG.en-US.md, LICENSE' # 禁止修改这些特定文件 skip-contribution-count: 10 # 如果贡献者（PR作者）的贡献次数超过10次，则跳过验证（即允许修改） skip-verify-authority: write # 如果PR作者在仓库中具有write权限（即协作者或更高），则跳过验证 skip-label: skip-verify-files # 如果PR被打上这个标签，则跳过验证 assignees: 'afc163, zombieJ, xrkffgg, MadCcc' # 如果验证失败，将分配给这些人 comment-mark: version # 用于标记评论的唯一标识，避免重复评论 comment: ... # 当验证失败时，在PR上评论的内容 close: true # 验证失败时关闭PR set-failed: false # 不将job标记为失败（避免整个工作流显示失败）
# 如果PR修改了禁止的路径（.github/或scripts/）或禁止的文件（CHANGELOG文件或LICENSE），那么就会触发这个action的验证失败流程。 但是，如果PR作者贡献次数超过10次，或者有write权限，或者PR被打上了skip-verify-files标签，则跳过验证（即允许修改）。

# 如果验证失败，则： - 在PR上评论指定的内容（内容中会@PR作者） - 关闭PR - 将PR分配给指定的团队成员

# readme任务（verify-readme步骤）：

# 目的是验证PR是否修改了README.md 文件（这里特指根目录的README.md ）。
# 配置参数： forbid-files: README.md # 禁止修改这个文件 skip-verify-authority: write # 同样，有write权限的跳过 skip-label: skip-verify-files # 同样的跳过标签 assignees: 'afc163, zombieJ, xrkffgg, MadCcc' # 同样的分配对象 comment-mark: readmeCheck # 不同的评论标记 comment: ... # 针对README修改的评论内容 close: true # 同样关闭PR set-failed: false
# 这个任务专门检查是否修改了README.md ，如果修改了，并且不满足跳过条件（有write权限或skip-verify-files标签），则关闭PR并评论。

# 注意：这两个任务是独立运行的，但条件相同，所以会在同一个PR事件中并行或依次运行。

# 总结：这个工作流的作用是保护一些敏感文件（如配置文件、脚本、CHANGELOG、LICENSE和README）不被外部贡献者随意修改。 只有核心团队成员（有write权限）或者贡献次数多的贡献者（超过10次）才可以修改这些文件。 这样可以防止不熟悉项目的人修改了重要文件。

# 但是，对于外部贡献者，如果无意中修改了这些文件，工作流会自动关闭PR并告知原因，同时将PR分配给核心团队成员，以便后续处理。
name: Verify Files modify

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.user.login != 'renovate[bot]' && github.event.pull_request.user.login != 'Copilot'
    permissions:
      pull-requests: write # for actions-cool/verify-files-modify to update status of PRs
    runs-on: ubuntu-latest
    steps:
      - name: verify-version
        uses: actions-cool/verify-files-modify@9f38a3b3d324d4d92c88c8a946001522e17ad554 # pin to latest verified commit
        with:
          forbid-paths: '.github/, scripts/'
          forbid-files: 'CHANGELOG.zh-CN.md, CHANGELOG.en-US.md, LICENSE'
          skip-contribution-count: 10
          skip-verify-authority: write
          skip-label: skip-verify-files
          assignees: 'afc163, zombieJ, xrkffgg, MadCcc'
          comment-mark: version
          comment: |
            Hi @${{ github.event.pull_request.user.login }}. Thanks for your contribution. The path `.github/` or `scripts/` and `CHANGELOG` is only maintained by team members. This current PR will be closed and team members will help on this.
          close: true
          set-failed: false

  readme:
    if: github.event.pull_request.user.login != 'renovate[bot]' && github.event.pull_request.user.login != 'Copilot'
    permissions:
      pull-requests: write # for actions-cool/verify-files-modify to update status of PRs
    runs-on: ubuntu-latest
    steps:
      - name: verify-readme
        uses: actions-cool/verify-files-modify@9f38a3b3d324d4d92c88c8a946001522e17ad554 # pin to latest verified commit
        with:
          forbid-files: README.md
          skip-verify-authority: write
          skip-label: skip-verify-files
          assignees: 'afc163, zombieJ, xrkffgg, MadCcc'
          comment-mark: readmeCheck
          comment: |
            Hi @${{ github.event.pull_request.user.login }}. Thanks for your contribution. But, we don't have plan to add README of more languages. This current PR will be closed and team members will help on this.
          close: true
          set-failed: false
