# 这个 GitHub Actions 脚本的目的是 在每次提交或拉取请求时，自动构建项目并发布示例。具体步骤如下：

# 触发条件：
# 推送 (push)：当有新的提交推送到仓库时触发。
# 拉取请求 (pull_request)：当有拉取请求（PR）被创建或更新时触发。
# 工作流程：
# 代码检出：

# 使用 actions/checkout@v5 步骤从仓库中检出最新的代码。
# 启用 Corepack：

# 运行 corepack enable，确保启用 Corepack，这样可以确保 Bun（一个 JavaScript 和 TypeScript 构建工具）能正常运行。
# 安装 Bun 和依赖：

# 使用 oven-sh/setup-bun@v2 设置 Bun 环境。
# 通过 bun install 安装项目的依赖。
# 构建项目：

# 使用 bun run build 命令构建项目。
# 准备示例代码：

# 清理已有示例：使用 rm -rf examples 删除现有的示例文件夹。
# 克隆示例仓库：通过 actions/checkout@v5 克隆 ant-design/ant-design-examples 仓库，并将示例代码放到 examples 文件夹中。
# 修改示例代码：运行 bunx tsx scripts/prepare-examples.ts 来修改示例代码。这可能是为了将示例代码准备成适合发布的形式。
# 发布示例：

# 运行 bunx pkg-pr-new publish --template './examples/examples/*'，将准备好的示例代码发布。这个命令可能是用来发布示例或创建新的 PR。
name: Publish Any Commit
# on: [push, pull_request]
on: []

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - run: corepack enable
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # ========== Prepare examples ==========
      - name: Clear examples
        run: rm -rf examples

      - name: Clone examples
        uses: actions/checkout@v5
        with:
          repository: ant-design/ant-design-examples
          path: examples

      - name: Modify examples
        run: bunx tsx scripts/prepare-examples.ts

      - run: bunx pkg-pr-new publish --template './examples/examples/*'
