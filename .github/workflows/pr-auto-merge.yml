# 这个 GitHub Actions 脚本的目的是 自动化地合并 master 分支和 feature 分支，并且定期执行合并操作。以下是它的具体功能：

# 触发条件：
# 定时触发 (schedule)：通过 cron 表达式 "*/5 * * * *"，每 5 分钟检查一次是否有需要合并的分支。
# 权限：
# 脚本设置了所需的权限，包括：
# 读取内容权限。
# 写入拉取请求、更新问题，这些权限使脚本能够合并拉取请求并处理相关任务。
# 工作流程：
# PR 合并检查：

# 只有当仓库为 ant-design/ant-design 时，工作流才会执行（if: github.repository == 'ant-design/ant-design'）。
# 使用 check-pr-ci action 检查是否有标有 BranchAutoMerge 标签的拉取请求，并判断它们是否准备好被合并。
# 过滤条件：

# 标签过滤：仅考虑标有 BranchAutoMerge 标签的 PR。
# 创建者权限过滤：仅考虑由具有 write 权限的用户创建的 PR。
# 目标分支过滤：仅考虑目标分支为 master、feature、next、master-merge-feature、feature-merge-master、next-merge-master、next-merge-feature 等的 PR。
# 冲突检查：如果分支存在冲突，将评论提醒“该分支存在冲突，必须解决！”
# 合并与审查：

# 如果没有冲突且 PR 符合条件，脚本会自动使用 merge 方法合并 PR。
# 同时，它会留下成功的审查（success-review: true），并将合并提交的消息标注为 'chore: auto merge branches (#${number})'。
# 总结：
# 自动化合并：该脚本会自动检查是否有需要合并的拉取请求，并在符合条件时自动合并。
# 冲突处理：如果检测到冲突，脚本会提醒团队进行解决。
# 定期检查：定时触发器确保每 5 分钟自动检查是否有需要合并的分支，确保分支始终保持同步。
# Used to merge master/feature branches with each other
name: PR Auto Merge Bot

on:
  # schedule:
  #   - cron: "*/5 * * * *"
  schedule: []

permissions:
  contents: read

jobs:
  pr-check-ci:
    if: github.repository == 'ant-design/ant-design'
    permissions:
      checks: read # for actions-cool/check-pr-ci to get check reference
      contents: write # for actions-cool/check-pr-ci to merge PRs
      issues: write # for actions-cool/check-pr-ci to update issues
      pull-requests: write # for actions-cool/check-pr-ci to update PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions-cool/check-pr-ci@v1
        with:
          filter-label: BranchAutoMerge
          filter-creator-authority: write
          filter-head-ref: 'master, feature, next, master-merge-feature, feature-merge-master, next-merge-master, next-merge-feature'
          filter-support-fork: false
          skip-run-names: 'deploy preview, pr-check-ci, upstream workflow summary, suggest-related-links, download visual-regression report'
          conflict-review-body: 😅 This branch has conflicts that must be resolved!
          success-review: true
          success-merge: true
          merge-method: merge
          merge-title: 'chore: auto merge branches (#${number})'
